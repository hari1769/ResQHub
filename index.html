    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-storage.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-messaging.js";

        window.FirebaseSDK = {
            initializeApp, getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
            getFirestore, collection, addDoc, getDocs, onSnapshot, query, orderBy, limit,
            getStorage, ref, uploadBytes, getDownloadURL,
            getMessaging, getToken, onMessage
        };

        window.initFirebase = (config) => {
            window.app = window.FirebaseSDK.initializeApp(config);
            window.auth = window.FirebaseSDK.getAuth(window.app);
            window.db = window.FirebaseSDK.getFirestore(window.app);
            window.storage = window.FirebaseSDK.getStorage(window.app);
            window.messaging = window.FirebaseSDK.getMessaging(window.app);
        };

        window.firebaseMock = {
            login: async (email, pass) => {
                const cred = await window.FirebaseSDK.signInWithEmailAndPassword(window.auth, email, pass);
                const loginData = {
                    name: cred.user.displayName || email.split('@')[0],
                    email: cred.user.email,
                    loginTime: Date.now(),
                    device: navigator.userAgent,
                    location: 'Unknown',
                    ip: 'Unknown'
                };
                await window.FirebaseSDK.addDoc(window.FirebaseSDK.collection(window.db, 'user_logins'), loginData);
                return cred;
            },
            googleLogin: async () => {
                const provider = new window.FirebaseSDK.GoogleAuthProvider();
                const cred = await window.FirebaseSDK.signInWithPopup(window.auth, provider);
                const loginData = {
                    name: cred.user.displayName,
                    email: cred.user.email,
                    loginTime: Date.now(),
                    device: navigator.userAgent,
                    location: 'Unknown',
                    ip: 'Unknown'
                };
                await window.FirebaseSDK.addDoc(window.FirebaseSDK.collection(window.db, 'user_logins'), loginData);
                return cred;
            },
            uploadFile: async (file) => {
                if(!file) return "";
                const storageRef = window.FirebaseSDK.ref(window.storage, `avatars/${window.auth.currentUser.uid}_${Date.now()}`);
                await window.FirebaseSDK.uploadBytes(storageRef, file);
                return await window.FirebaseSDK.getDownloadURL(storageRef);
            },
            updateUserProfileImage: async (url) => {
                // To keep it simple, we just rely on standard Firebase Auth profile update or ignore it inside the mock wrapper since the UI handles preview state.
                return url; 
            },
            syncOfflineQueue: async () => {
                const queue = JSON.parse(localStorage.getItem('safelink_offline_queue')) || [];
                if (queue.length === 0) return 0;
                let count = 0;
                for (const alertData of queue) {
                    delete alertData._isOfflineQueued;
                    delete alertData._queuedAt;
                    await window.firebaseMock.createAlert(alertData, true);
                    count++;
                }
                localStorage.removeItem('safelink_offline_queue');
                return count;
            },
            createAlert: async (alertData, isSyncing = false) => {
                if (!navigator.onLine && !isSyncing) {
                    const queue = JSON.parse(localStorage.getItem('safelink_offline_queue')) || [];
                    queue.push({ ...alertData, _queuedAt: Date.now() });
                    localStorage.setItem('safelink_offline_queue', JSON.stringify(queue));
                    return { id: 'QUEUED', ...alertData, _isOfflineQueued: true };
                }
                const dataToSave = {
                    userId: window.auth && window.auth.currentUser ? window.auth.currentUser.uid : 'anon',
                    status: 'Active',
                    timestamp: Date.now(),
                    ...alertData
                };
                const docRef = await window.FirebaseSDK.addDoc(window.FirebaseSDK.collection(window.db, 'alerts'), dataToSave);
                return { id: docRef.id, ...dataToSave };
            },
            getEmergencyContacts: async () => {
                return []; // Needs where query, simplified for now
            },
            addEmergencyContact: async (contact) => {
                const dataToSave = { userId: window.auth.currentUser.uid, ...contact };
                const docRef = await window.FirebaseSDK.addDoc(window.FirebaseSDK.collection(window.db, 'emergency_contacts'), dataToSave);
                return { id: docRef.id, ...dataToSave };
            },
            deleteEmergencyContact: async (id) => {
                return true;
            },
            getUserLogins: async () => {
                const q = window.FirebaseSDK.query(window.FirebaseSDK.collection(window.db, 'user_logins'), window.FirebaseSDK.orderBy('loginTime', 'desc'), window.FirebaseSDK.limit(100));
                const snap = await window.FirebaseSDK.getDocs(q);
                return snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            },
            subscribeToAlerts: (callback) => {
                const q = window.FirebaseSDK.query(window.FirebaseSDK.collection(window.db, 'alerts'), window.FirebaseSDK.orderBy('timestamp', 'desc'));
                return window.FirebaseSDK.onSnapshot(q, (snapshot) => {
                    callback(snapshot.docs.map(doc => ({id: doc.id, ...doc.data()})));
                }, (error) => console.log(error));
            },
            subscribeToNotifications: (callback) => {
                return () => {}; // Dummy implementation since FCM requires service workers
            },
            requestNotificationPermission: () => new Promise(resolve => {
                setTimeout(() => resolve('granted'), 500);
            })
        };
    </script>

        };

        // --- COMPONENTS ---

        // 0. AI Chatbot
        const AIChatbot = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [isHovered, setIsHovered] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'assistant', content: 'Hello! I am your ResQHub AI Emergency Assistant. I can help with disaster safety, first aid guidance, and finding nearby shelters.' }
            ]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                if (isOpen) scrollToBottom();
            }, [messages, isOpen]);

            const handleSend = async (e) => {
                e.preventDefault();
                const currentApiKey = window.openAiKey || localStorage.getItem('safelink_openai');
                if (!input.trim() || !currentApiKey) {
                    if (!currentApiKey) setMessages(prev => [...prev, { role: 'assistant', content: `Error: OpenAI API Key is missing. Please restart the app configuration.` }]);
                    return;
                }

                const userMsg = { role: 'user', content: input };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setLoading(true);

                try {
                    const res = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${currentApiKey}`
                        },
                        body: JSON.stringify({
                            model: 'gpt-3.5-turbo',
                            messages: [
                                { role: 'system', content: 'You are the ResQHub AI Emergency Assistant. Your role is to provide quick, accurate, and concise disaster safety advice, first aid guidance, and suggest general steps for finding shelters or hospitals. Always advise users to contact local emergency services for immediate life-threatening situations. Format your responses using markdown spacing if helpful but do not use complex markdown that cannot render properly in a simple flex container.' },
                                ...messages.map(({ role, content }) => ({ role, content })),
                                userMsg
                            ]
                        })
                    });

                    const data = await res.json();

                    if (!res.ok) throw new Error(data.error?.message || 'Failed to fetch');

                    const botMsg = { role: 'assistant', content: data.choices[0].message.content };
                    setMessages(prev => [...prev, botMsg]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'assistant', content: `Error: ${err.message}. Please check your API key or connection.` }]);
                    if (err.message.includes('API')) setShowKeyPrompt(true);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="fixed bottom-6 right-24 z-50">
                    {/* Chat Window */}
                    {isOpen && (
                        <div className="absolute bottom-16 right-0 w-[350px] h-[500px] bg-neutral-900 border border-white/10 shadow-2xl rounded-2xl flex flex-col overflow-hidden animate-[fade-in_0.2s_ease-out]">
                            {/* Header */}
                            <div className="px-4 py-3 bg-gradient-to-r from-primary-600 to-primary-500 flex justify-between items-center text-white shadow-md relative z-10">
                                <div className="flex items-center gap-2">
                                    <Icons.Sparkles className="w-5 h-5" />
                                    <div>
                                        <h3 className="font-semibold text-sm leading-tight">ResQHub AI</h3>
                                        <p className="text-[10px] text-white/80 leading-tight">Emergency Assistant</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-1">
                                    <button onClick={() => setIsOpen(false)} className="hover:bg-white/20 p-1 rounded-md transition-colors"><Icons.X /></button>
                                </div>
                            </div>

                            {/* Messages */}
                            <div className="flex-1 p-4 overflow-y-auto bg-neutral-950/50 space-y-4">
                                        {messages.map((m, i) => (
                                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`max-w-[85%] rounded-2xl px-4 py-2.5 text-sm whitespace-pre-wrap ${m.role === 'user' ? 'bg-primary-600 text-white rounded-br-sm shadow-[0_2px_10px_rgba(37,99,235,0.2)]' : 'bg-neutral-800 text-neutral-200 border border-white/5 rounded-bl-sm dropdown-shadow shadow-black/20'}`}>
                                                    {m.content}
                                                </div>
                                            </div>
                                        ))}
                                        {loading && (
                                            <div className="flex justify-start">
                                                <div className="max-w-[85%] rounded-2xl px-4 py-3 bg-neutral-800 border border-white/5 rounded-bl-sm flex gap-1.5 items-center">
                                                    <div className="w-1.5 h-1.5 bg-neutral-400 rounded-full animate-bounce"></div>
                                                    <div className="w-1.5 h-1.5 bg-neutral-400 rounded-full animate-bounce" style={{ animationDelay: '0.15s' }}></div>
                                                    <div className="w-1.5 h-1.5 bg-neutral-400 rounded-full animate-bounce" style={{ animationDelay: '0.3s' }}></div>
                                                </div>
                                            </div>
                                        )}
                                        <div ref={messagesEndRef} />
                                    </div>

                                    {/* Input Area */}
                                    <form onSubmit={handleSend} className="p-3 bg-neutral-950 border-t border-white/5 flex gap-2">
                                        <input type="text" value={input} onChange={e => setInput(e.target.value)} placeholder="Ask for emergency advice..." className="flex-1 bg-neutral-900 border border-white/10 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-primary-500 transition-colors" />
                                        <button type="submit" disabled={!input.trim() || loading} className="p-2.5 bg-primary-600 hover:bg-primary-500 text-white rounded-xl disabled:opacity-50 transition-colors shadow-lg active:scale-95">
                                            <svg className="w-4 h-4 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                                        </button>
                                    </form>
                        </div>
                    )}

                    {/* Toggle Button */}
                    <div className="flex items-center gap-3 relative group">
                        <div className={`absolute right-full mr-3 px-3 py-1.5 bg-neutral-900 border border-white/10 rounded-lg text-xs font-medium text-neutral-300 dropdown-shadow whitespace-nowrap transition-opacity duration-300 ${isHovered && !isOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                            AI Assistant
                        </div>
                        <button
                            onClick={() => setIsOpen(!isOpen)}
                            onMouseEnter={() => setIsHovered(true)}
                            onMouseLeave={() => setIsHovered(false)}

                                        <label className="block text-xs text-neutral-500 mb-1">Email Address</label>
                                        <input type="email" disabled value={user?.email || ''} className="w-full bg-neutral-950/50 border border-white/5 rounded-lg px-3 py-2 text-white text-sm opacity-50 cursor-not-allowed" />
                                    </div>
                                </div>
                            </div>

                            {/* Emergency Contacts */}
                            <div className="card p-6">
                                <div className="flex justify-between items-center mb-4">
                                    <div>
                                        <h3 className="text-sm font-medium text-white">Emergency Contacts</h3>
                                        <p className="text-xs text-neutral-500 mt-0.5">Notified automatically when SOS is triggered.</p>
                                    </div>
                                    <button onClick={() => setIsAddingContact(!isAddingContact)} className="px-3 py-1.5 bg-white/5 hover:bg-white/10 text-white rounded-md text-xs font-medium transition-colors border border-white/10 flex items-center gap-1">
                                        {isAddingContact ? 'Cancel' : <><Icons.Plus /> Add</>}
                                    </button>
                                </div>

                                {isAddingContact && (
                                    <form onSubmit={handleAddContact} className="mb-6 p-4 bg-neutral-950/50 border border-white/5 rounded-lg space-y-3">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                            <div>
                                                <label className="block text-[10px] text-neutral-500 uppercase tracking-wider mb-1">Contact Name</label>
                                                <input required type="text" placeholder="John Doe" value={newContact.contactName} onChange={e => setNewContact({...newContact, contactName: e.target.value})} className="w-full bg-neutral-900 border border-white/10 rounded-md px-3 py-1.5 text-white text-sm focus:border-primary-500 focus:outline-none" />
                                            </div>
                                            <div>
                                                <label className="block text-[10px] text-neutral-500 uppercase tracking-wider mb-1">Relationship</label>
                                                <input required type="text" placeholder="Parent, Spouse, etc." value={newContact.relationship} onChange={e => setNewContact({...newContact, relationship: e.target.value})} className="w-full bg-neutral-900 border border-white/10 rounded-md px-3 py-1.5 text-white text-sm focus:border-primary-500 focus:outline-none" />
                                            </div>
                                            <div className="sm:col-span-2">
                                                <label className="block text-[10px] text-neutral-500 uppercase tracking-wider mb-1">Phone Number</label>
                                                <input required type="tel" placeholder="+1 (555) 000-0000" value={newContact.phoneNumber} onChange={e => setNewContact({...newContact, phoneNumber: e.target.value})} className="w-full bg-neutral-900 border border-white/10 rounded-md px-3 py-1.5 text-white text-sm focus:border-primary-500 focus:outline-none" />
                                            </div>
                                        </div>
                                        <button type="submit" disabled={loading} className="w-full py-2 bg-primary-600 hover:bg-primary-500 text-white text-sm font-medium rounded-md transition-colors shadow-lg shadow-primary-500/20 disabled:opacity-50 mt-2">
                                            Save Contact
                                        </button>
                                    </form>
                                )}

                                <div className="space-y-2">
                                    {contacts.length === 0 ? (
                                        <div className="text-center py-6 text-sm text-neutral-500 bg-neutral-950/30 rounded-lg border border-white/5 border-dashed">No emergency contacts registered.</div>
                                    ) : (
                                        contacts.map(c => (
                                            <div key={c.id} className="flex items-center justify-between p-3 bg-neutral-950/50 border border-white/5 rounded-lg hover:border-white/10 transition-colors">
                                                <div>
                                                    <div className="text-sm font-medium text-white flex items-center gap-2">
                                                        {c.contactName} <span className="px-1.5 py-0.5 rounded bg-primary-500/10 text-primary-400 text-[10px] uppercase tracking-wider">{c.relationship}</span>
                                                    </div>
                                                    <div className="text-xs text-neutral-500 mt-0.5">{c.phoneNumber}</div>
                                                </div>
                                                <button onClick={() => handleRemoveContact(c.id)} className="p-1.5 text-neutral-500 hover:text-danger-400 hover:bg-danger-500/10 rounded transition-colors" title="Remove Contact">
                                                    <Icons.X />
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');

            // Setup State
            const [needsSetup, setNeedsSetup] = useState(true);
            const [setupData, setSetupData] = useState({ apiKey: '', authDomain: '', projectId: '', storageBucket: '', messagingSenderId: '', appId: '', openAiKey: '' });

            useEffect(() => {
                const configStr = localStorage.getItem('safelink_config');
                window.openAiKey = localStorage.getItem('safelink_openai') || '';
                if(configStr) {
                    try {
                        const config = JSON.parse(configStr);
                        window.initFirebase(config);
                        setNeedsSetup(false);
                        window.FirebaseSDK.onAuthStateChanged(window.auth, (u) => {
                            if(u) setUser({ email: u.email, displayName: u.displayName, uid: u.uid, photoURL: u.photoURL });
                            else setUser(null);
                        });
                    } catch(e) { console.error(e); }
                }
            }, []);

            const handleSetup = (e) => {
                e.preventDefault();
                try {
                    const fbConfig = { apiKey: setupData.apiKey, authDomain: setupData.authDomain, projectId: setupData.projectId, storageBucket: setupData.storageBucket, messagingSenderId: setupData.messagingSenderId, appId: setupData.appId };
                    localStorage.setItem('safelink_config', JSON.stringify(fbConfig));
                    localStorage.setItem('safelink_openai', setupData.openAiKey);
                    window.openAiKey = setupData.openAiKey;
                    window.initFirebase(fbConfig);
                    setNeedsSetup(false);
                    window.FirebaseSDK.onAuthStateChanged(window.auth, (u) => {
                        if(u) setUser({ email: u.email, displayName: u.displayName, uid: u.uid, photoURL: u.photoURL });
                    });
                } catch(err) {
                    alert('Configuration Error: ' + err.message);
                    localStorage.removeItem('safelink_config');
                }
            };

            // Global connectivity state
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [isSyncing, setIsSyncing] = useState(false);

            // SOS State
            const [isSOSModalOpen, setIsSOSModalOpen] = useState(false);
            const [sosLoading, setSosLoading] = useState(false);
            const [toastMsg, setToastMsg] = useState('');

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 5000);
            };

            // Setup Online/Offline listeners
            useEffect(() => {
                const handleOnline = async () => {
                    setIsOnline(true);

                    // Trigger sync when reconnected
                    const queuedItems = JSON.parse(localStorage.getItem('safelink_offline_queue') || '[]');
                    if (queuedItems.length > 0) {
                        setIsSyncing(true);
                        try {
                            const syncedCount = await window.firebaseMock.syncOfflineQueue();
                            setIsSyncing(false);
                            showToast(`Connection restored. Synced ${syncedCount} offline alerts.`);
                        } catch (e) {
                            console.error("Sync failed", e);
                            setIsSyncing(false);
                        }
                    } else {
                        showToast('Connection restored.');
                    }
                };

                const handleOffline = () => {
                    setIsOnline(false);
                    showToast('You are offline. Reports will be saved locally.');
                };

                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);

                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            const triggerSOS = async () => {
                setSosLoading(true);

                try {
                    // Try to get actual coordinates, fallback to mock if denied/unavailable
                    const coords = await new Promise((resolve, reject) => {
                        if (navigator.geolocation && isOnline) { // Avoid long timeout if offline
                            navigator.geolocation.getCurrentPosition(
                                (pos) => resolve(`${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`),
                                (err) => resolve('Sector 4 Operations (Fallback Location)') // fallback on error for demo
                            );
                        } else {
                            resolve('Sector 4 Operations (Fallback Location)');
                        }
                    });

                    // Create critical incident
                    const result = await window.firebaseMock.createAlert({
                        type: 'SOS Emergency',
                        severity: 'Critical',
                        location: coords,
                        description: 'Immediate assistance required! User triggered SOS.',
                    });

                    // Alert Emergency Contacts (Simulation)
                    if (isOnline) {
                        const contacts = await window.firebaseMock.getEmergencyContacts();
                        if (contacts.length > 0) {
                            console.log(`[Cloud Function Triggered] Sending SMS to ${contacts.length} emergency contacts.`);
                            contacts.forEach(c => {
                                console.log(`SMS Dispatched -> ${c.phoneNumber}: "Emergency Alert from SafeLink. ${user?.displayName || 'User'} may be in danger. Location: https://maps.google.com/?q=${coords.replace(' ', '')}"`);
                            });
                        }
                    }

                    if (result._isOfflineQueued) {
                        showToast('You are offline. SOS Alert queued locally for later sync.');
                    } else {
                        showToast('SOS Broadcasted successfully. Nearby users, authorities, & contacts notified.');
                    }
                } catch (e) {
                    console.error('SOS Failed', e);
                    showToast('Error broadcasting SOS.');
                } finally {
                    setSosLoading(false);
                    setIsSOSModalOpen(false);
                }
            };

            // Push Notification State
            const [notifications, setNotifications] = useState([]);
            const [showPushContent, setShowPushContent] = useState(null);

            useEffect(() => {
                // Request Permission (Mock)
                window.firebaseMock.requestNotificationPermission().then(status => {
                    if (status === 'granted') {
                        // Subscribe to Mock FCM
                        const unsubscribe = window.firebaseMock.subscribeToNotifications((notif) => {
                            setNotifications(prev => [notif, ...prev]);

                            // Native browser notification if supported and page isn't active
                            if (Notification.permission === "granted" && document.visibilityState !== "visible") {
                                new Notification(notif.title, { body: notif.body });
                            }

                            // App UI Push Toast
                            setShowPushContent(notif);
                            setTimeout(() => setShowPushContent(null), 8000); // Hide after 8s
                        });
                        return () => unsubscribe();
                    }
                });
            }, []);

            useEffect(() => {
                const style = document.createElement('style');
                style.innerHTML = `
                    @keyframes fade-in {
                        from { opacity: 0; transform: translateY(4px); }
                        to { opacity: 1; transform: translateY(0); }
                    }
                    @keyframes slide-up {
                        from { opacity: 0; bottom: 1rem; }
                        to { opacity: 1; bottom: 2rem; }
                    }
                    @keyframes slide-down {
                        from { opacity: 0; top: -1rem; }
                        to { opacity: 1; top: 1.5rem; }
                    }
                `;
                document.head.appendChild(style);
                return () => document.head.removeChild(style);
            }, []);

            if (needsSetup) {
                return (
                    <div className="min-h-screen bg-[#0a0a0a] flex items-center justify-center p-4">
                        <div className="bg-neutral-900 border border-white/10 rounded-2xl p-8 max-w-lg w-full shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-primary-500/10 rounded-full blur-[80px] pointer-events-none"></div>
                            <h2 className="text-2xl font-bold text-white mb-2 relative z-10 flex items-center gap-2"><Icons.Shield className="text-primary-500" /> Live Production Setup</h2>
                            <p className="text-sm text-neutral-400 mb-6 relative z-10">SafeLink has been upgraded directly to use real Firebase and OpenAI. Please enter your project keys to initialize the application.</p>
                            <form onSubmit={handleSetup} className="space-y-4 relative z-10">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="col-span-2"><label className="block text-xs font-medium text-neutral-500 mb-1">API Key</label><input required type="password" className="w-full bg-neutral-950 border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:border-primary-500 focus:outline-none transition-colors" value={setupData.apiKey} onChange={e=>setSetupData({...setupData, apiKey: e.target.value})} placeholder="AIzaSy..." /></div>
                                    <div className="col-span-2 sm:col-span-1"><label className="block text-xs font-medium text-neutral-500 mb-1">Auth Domain</label><input required className="w-full bg-neutral-950 border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:border-primary-500 focus:outline-none transition-colors" value={setupData.authDomain} onChange={e=>setSetupData({...setupData, authDomain: e.target.value})} placeholder="app.firebaseapp.com" /></div>
                                    <div className="col-span-2 sm:col-span-1"><label className="block text-xs font-medium text-neutral-500 mb-1">Project ID</label><input required className="w-full bg-neutral-950 border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:border-primary-500 focus:outline-none transition-colors" value={setupData.projectId} onChange={e=>setSetupData({...setupData, projectId: e.target.value})} placeholder="my-project-id" /></div>
                                    <div className="col-span-2 sm:col-span-1"><label className="block text-xs font-medium text-neutral-500 mb-1">Storage Bucket</label><input required className="w-full bg-neutral-950 border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:border-primary-500 focus:outline-none transition-colors" value={setupData.storageBucket} onChange={e=>setSetupData({...setupData, storageBucket: e.target.value})} placeholder="app.appspot.com" /></div>
                                    <div className="col-span-2 sm:col-span-1"><label className="block text-xs font-medium text-neutral-500 mb-1">Messaging Sender ID</label><input required className="w-full bg-neutral-950 border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:border-primary-500 focus:outline-none transition-colors" value={setupData.messagingSenderId} onChange={e=>setSetupData({...setupData, messagingSenderId: e.target.value})} placeholder="1234567890" /></div>
                                    <div className="col-span-2"><label className="block text-xs font-medium text-neutral-500 mb-1">App ID</label><input required className="w-full bg-neutral-950 border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:border-primary-500 focus:outline-none transition-colors" value={setupData.appId} onChange={e=>setSetupData({...setupData, appId: e.target.value})} placeholder="1:123:web:abc" /></div>
                                </div>
                                <div className="pt-6 border-t border-white/10 mt-6">
                                    <label className="block text-xs font-medium text-neutral-500 mb-1 flex justify-between"><span>OpenAI API Key <span className="text-primary-500/70">(Used for AI Assistant)</span></span></label>
                                    <input required type="password" className="w-full bg-neutral-950 border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:border-primary-500 focus:outline-none transition-colors" value={setupData.openAiKey} onChange={e=>setSetupData({...setupData, openAiKey: e.target.value})} placeholder="sk-..." />
                                </div>
                                <button type="submit" className="w-full py-3 mt-6 bg-primary-600 hover:bg-primary-500 text-white font-medium rounded-lg transition-colors shadow-lg shadow-primary-500/20">Initialize SafeLink Core</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (!user) {
                return <AuthScreen onLogin={setUser} />;
            }

            return (
                <div className="flex min-h-screen bg-[#0a0a0a] text-neutral-200">
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} onLogout={() => setUser(null)} user={user} />

                    <div className="flex-1 flex flex-col min-w-0 relative">
                        {/* Global Push Notification Toast */}
                        {showPushContent && (
                            <div className="fixed top-6 right-6 z-[200] w-80 bg-neutral-900 border border-white/10 rounded-xl shadow-2xl p-4 flex gap-3 animate-[slide-down_0.4s_ease-out]">
                                <div className={`flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center border
                                    ${showPushContent.type === 'sos' ? 'bg-danger-500/10 border-danger-500/20 text-danger-500' :
                                        showPushContent.type === 'warning' ? 'bg-orange-500/10 border-orange-500/20 text-orange-500' :
                                            'bg-primary-500/10 border-primary-500/20 text-primary-500'}`}
                                >
                                    {showPushContent.type === 'sos' ? <Icons.AlertTriangle className="w-5 h-5" /> : <Icons.Bell className="w-5 h-5" />}
                                </div>
                                <div className="flex-1 min-w-0">
                                    <div className="flex justify-between items-start">
                                        <p className="text-sm font-semibold text-white truncate">{showPushContent.title}</p>
                                        <button onClick={() => setShowPushContent(null)} className="text-neutral-500 hover:text-white"><Icons.X /></button>
                                    </div>
                                    <p className="text-xs text-neutral-400 mt-0.5 line-clamp-2">{showPushContent.body}</p>
                                </div>
                            </div>
                        )}

                        <Navbar activeTab={activeTab} user={user} notifications={notifications} />

                        {/* Offline Banner */}
                        {!isOnline && (
                            <div className="bg-orange-500/10 border-b border-orange-500/20 px-4 py-2 flex items-center justify-center gap-2 z-30">
                                <Icons.AlertTriangle className="w-4 h-4 text-orange-400" />
                                <span className="text-xs font-medium text-orange-400">Offline Mode. Actions are cached locally and will sync when reconnected.</span>
                            </div>
                        )}
                        {isSyncing && (
                            <div className="bg-primary-500/10 border-b border-primary-500/20 px-4 py-2 flex items-center justify-center gap-2 z-30">
                                <svg className="animate-spin h-3.5 w-3.5 text-primary-400" viewBox="0 0 24 24" fill="none"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                <span className="text-xs font-medium text-primary-400">Syncing offline data...</span>
                            </div>
                        )}

                        <main className="flex-1 relative pb-20 md:pb-0 overflow-y-auto w-full">
                            {/* Subtle background glow */}
                            <div className="fixed top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-primary-500/5 rounded-full blur-[100px] pointer-events-none -z-10"></div>

                            {activeTab === 'dashboard' ? (
                                <Dashboard />
                            ) : activeTab === 'settings' ? (
                                <ProfileSettings user={user} onUpdateUser={setUser} />
                            ) : activeTab === 'map' ? (
                                <div className="p-6 h-[calc(100vh-3.5rem)] animate-[fade-in_0.3s_ease]">
                                    <div className="flex justify-between items-center mb-4">
                                        <h1 className="text-xl font-semibold text-white">Live Disasters Map</h1>
                                    </div>
                                    <LiveMap fullScreen={true} alerts={[]} />
                                </div>
                            ) : activeTab === 'admin' ? (
                                <AdminDashboard />
                            ) : (
                                <div className="p-8 flex items-center justify-center h-full animate-[fade-in_0.3s_ease]">
                                    <div className="text-center">
                                        <div className="inline-block p-4 rounded-full bg-neutral-900 text-neutral-500 mb-4 border border-white/5">
                                            <Icons.Settings className="w-6 h-6" />
                                        </div>
                                        <h2 className="text-lg font-medium text-white capitalize">{activeTab} Viewer</h2>
                                        <p className="text-sm text-neutral-500 mt-2">Module pending integration.</p>
                                    </div>
                                </div>
                            )}
                        </main>

                        {/* Toast Notification */}
                        {toastMsg && (
                            <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-[150] px-4 py-3 bg-neutral-900 border border-white/10 rounded-xl shadow-2xl flex items-center gap-3 animate-[slide-up_0.3s_ease-out]">
                                <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                <span className="text-sm font-medium text-white">{toastMsg}</span>
                            </div>
                        )}
                    </div>

                    <AIChatbot />
                    <FloatingSOS onSOS={() => setIsSOSModalOpen(true)} />
                    <SOSConfirmationModal isOpen={isSOSModalOpen} onClose={() => setIsSOSModalOpen(false)} onConfirm={triggerSOS} loading={sosLoading} />
                </div>
            );
        };

        const AuthScreen = ({ onLogin }) => {
            const [isRegister, setIsRegister] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    // Using mock firebase auth for UI demonstration
                    const res = await window.firebaseMock.login(email, password);
                    onLogin(res.user);
                } catch (err) {
                    setError('Authentication failed. Please check credentials.');
                } finally {
                    setLoading(false);
                }
            };

            const handleGoogleLogin = async () => {
                setLoading(true);
                try {
                    const res = await window.firebaseMock.googleLogin();
                    onLogin(res.user);
                } catch (err) {
                    setError('Google login failed.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-[#0a0a0a] flex flex-col items-center justify-center p-4 relative overflow-hidden">
                    {/* Background glow */}
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary-500/10 rounded-full blur-[120px] pointer-events-none"></div>

                    <div className="w-full max-w-md bg-neutral-900/80 backdrop-blur-xl border border-white/10 p-8 rounded-2xl dropdown-shadow animate-[fade-in_0.5s_ease-out] z-10">
                        <div className="flex items-center justify-center mb-8">
                            <Icons.Logo />
                            <span className="ml-2 text-2xl font-bold tracking-tight text-white">SafeLink</span>
                        </div>

                        <h2 className="text-xl font-semibold text-white mb-2 text-center">
                            {isRegister ? 'Create an account' : 'Welcome back'}
                        </h2>
                        <p className="text-sm text-neutral-400 mb-6 text-center">
                            {isRegister ? 'Enter your details to register.' : 'Enter your credentials to access the dashboard.'}
                        </p>

                        {error && <div className="mb-4 p-3 bg-danger-500/10 border border-danger-500/20 rounded-lg text-danger-400 text-sm text-center">{error}</div>}

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-xs font-medium text-neutral-400 mb-1">Email Address</label>
                                <input
                                    type="email"
                                    required
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    className="w-full bg-neutral-950 border border-white/10 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-primary-500 transition-colors"
                                    placeholder="name@example.com"
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-medium text-neutral-400 mb-1">Password</label>
                                <input
                                    type="password"
                                    required
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full bg-neutral-950 border border-white/10 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-primary-500 transition-colors"
                                    placeholder="••••••••"
                                />
                            </div>

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-white text-black font-semibold rounded-lg px-4 py-2.5 text-sm hover:bg-neutral-200 transition-colors disabled:opacity-50 flex justify-center items-center"
                            >
                                {loading ? (
                                    <svg className="animate-spin h-4 w-4 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                ) : (
                                    isRegister ? 'Sign Up' : 'Sign In'
                                )}
                            </button>
                        </form>

                        <div className="mt-6">
                            <div className="relative">
                                <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-white/10"></div></div>
                                <div className="relative flex justify-center text-xs"><span className="bg-neutral-900 px-2 text-neutral-500">Or continue with</span></div>
                            </div>

                            <button
                                onClick={handleGoogleLogin}
                                disabled={loading}
                                className="mt-4 w-full bg-neutral-950 border border-white/10 text-white font-medium rounded-lg px-4 py-2.5 text-sm hover:bg-white/5 transition-colors flex items-center justify-center gap-2"
                            >
                                <svg className="w-4 h-4" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" /><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" /><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" /><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" /></svg>
                                Google
                            </button>
                        </div>

                        <p className="mt-6 text-center text-xs text-neutral-500">
                            {isRegister ? 'Already have an account?' : "Don't have an account?"}
                            <button onClick={() => setIsRegister(!isRegister)} className="ml-1 text-primary-400 hover:text-primary-300 font-medium">
                                {isRegister ? 'Sign in' : 'Sign up'}
                            </button>
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
